on:
  workflow_dispatch:

jobs:
  job_1:
    runs-on: ubuntu-latest
    steps:
      - name: job1
        run: "echo job ${{ github.job }}"
  job_2:
    runs-on: ubuntu-latest
    needs: job_1
    steps:
      - name: job2
        run: "echo ${{ github.job }}"
  job_3:
    runs-on: ubuntu-latest
    needs: job_1
    steps:
      - name: job3
        run: "echo ${{ github.job }}"
  job_4:
    runs-on: ubuntu-latest
    needs:
      - job_2
      - job_3
    steps:
      - name: job4
        run: "echo ${{ github.job }}"
