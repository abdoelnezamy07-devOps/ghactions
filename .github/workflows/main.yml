name: First workflow 
on:
  push:
    branches:
      - main
jobs:
  example-job:
    runs-on: ubuntu-latest

    steps:
      - name: print a welcome message
        run: echo "welcome to our first github actions worlflow"
        
      - name: List repository files before checkout
        run: ls -la

      - name: checkout repository
        uses: actions/checkout@v6.0.2
      
      - name: List repository files after checkout
        run: ls -la
      
      - name: checkout repository with fetch all 
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      
      - name: List repository files after checkout and fetch all repo
        run: ls -la
